name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: ${{ matrix.os }} (Swift ${{ matrix.swift }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            swift: "6.3"
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v --enable-code-coverage

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.3"]
    container:
      image: swift:${{ matrix.swift }}-jammy
    steps:
      - uses: actions/checkout@v6
      - run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  lint:
    name: swift-format lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - run: swift --version
      - name: Lint
        run: swift format lint --recursive --strict Sources Tests
