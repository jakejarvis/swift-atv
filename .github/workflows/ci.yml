name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly — catches toolchain regressions between releases.
    - cron: "0 12 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.0", "6.1"]
    steps:
      - uses: actions/checkout@v4
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ matrix.swift }}
      - run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v --enable-code-coverage

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.0", "6.1"]
    container:
      image: swift:${{ matrix.swift }}-jammy
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  lint:
    name: swift-format lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: swift format lint --recursive --strict Sources Tests
